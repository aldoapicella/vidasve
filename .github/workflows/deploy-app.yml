name: deploy-app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "api/**"
      - "package.json"
      - "package-lock.json"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - run: npm ci
      - run: npm run ci
      - name: Build SPA
        run: npm run build --workspace app
        env:
          VITE_API_BASE_URL: https://${{ vars.FUNCTION_APP_NAME }}.azurewebsites.net/api
      - name: Deploy Static Web App
        run: |
          token="$(az staticwebapp secrets list --name "${{ vars.SWA_NAME }}" --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" --query properties.apiKey -o tsv)"
          echo "::add-mask::$token"
          npx @azure/static-web-apps-cli deploy app/dist \
            --deployment-token "$token" \
            --env production
      - name: Build API package
        run: |
          npm run build --workspace api
          rm -rf deploy-api
          mkdir deploy-api
          cp -R api/dist api/host.json api/package.json deploy-api/
          cd deploy-api
          npm install --omit=dev
          zip -qr ../api.zip .
      - name: Deploy Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.FUNCTION_APP_NAME }}" \
            --src api.zip
      - name: Smoke test API
        run: |
          curl --fail "https://${{ vars.FUNCTION_APP_NAME }}.azurewebsites.net/api/health"
