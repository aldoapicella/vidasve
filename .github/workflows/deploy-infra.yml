name: deploy-infra

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "infra/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep
        env:
          BUDGET_CONTACT_EMAILS_JSON: ${{ vars.BUDGET_CONTACT_EMAILS_JSON }}
          MONTHLY_BUDGET_AMOUNT: ${{ vars.MONTHLY_BUDGET_AMOUNT }}
          MEDIA_UPLOADS_ENABLED: ${{ vars.MEDIA_UPLOADS_ENABLED }}
          GEOCODING_ENABLED: ${{ vars.GEOCODING_ENABLED }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
        run: |
          budgetContactEmailsJson="${BUDGET_CONTACT_EMAILS_JSON:-[]}"
          monthlyBudgetAmount="${MONTHLY_BUDGET_AMOUNT:-25}"
          mediaUploadsEnabled="${MEDIA_UPLOADS_ENABLED:-false}"
          geocodingEnabled="${GEOCODING_ENABLED:-true}"
          az deployment group create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters \
              appName="${{ vars.APP_NAME }}" \
              location="${{ vars.AZURE_LOCATION }}" \
              appHmacSecret="${{ secrets.APP_HMAC_SECRET }}" \
              piiEncryptionKey="${{ secrets.PII_ENCRYPTION_KEY }}" \
              allowedOrigins="${{ vars.ALLOWED_ORIGINS }}" \
              publicAppUrl="${{ vars.PUBLIC_APP_URL }}" \
              azureMapsRoleDefinitionId="${{ vars.AZURE_MAPS_ROLE_DEFINITION_ID }}" \
              mediaUploadsEnabled="$mediaUploadsEnabled" \
              geocodingEnabled="$geocodingEnabled" \
              turnstileSiteKey="${TURNSTILE_SITE_KEY:-}" \
              turnstileSecretKey="${{ secrets.TURNSTILE_SECRET_KEY }}" \
              budgetContactEmailsJson="$budgetContactEmailsJson" \
              monthlyBudgetAmount="$monthlyBudgetAmount"
